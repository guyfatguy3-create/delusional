<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
    }

    /* FIXED VIDEO (NO ZOOM) */
    #bgVideo {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: contain; /* 🔥 THIS FIXES YOUR ISSUE */
        background: black;
        z-index: 0;
    }

    /* ENTER SCREEN */
    .enter-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        cursor: pointer;
    }

    .enter-text {
        font-size: 1.2rem;
        color: #888;
        letter-spacing: 5px;
        text-transform: uppercase;
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
    }

    .enter-screen.hidden {
        display: none;
    }

    /* SIDEBAR */
    .sidebar {
        position: fixed;
        left: 20px;
        top: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        z-index: 100;
    }

    .icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        padding: 8px;
        border-radius: 6px;
        transition: all 0.2s ease;
    }

    .icon:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.1);
    }

    .icon svg {
        width: 32px;
        height: 32px;
        fill: rgba(255, 255, 255, 0.8);
    }

    .icon span {
        margin-top: 4px;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.6);
    }

    /* BUTTON */
    .learn-more {
        position: fixed;
        right: 30px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 100;
    }

    .learn-more a {
        display: block;
        padding: 12px 24px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-size: 0.85rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 4px;
        transition: all 0.3s ease;
    }

    .learn-more a:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    /* BOTTOM TEXT */
    .ca-text {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 3px;
        text-transform: uppercase;
        z-index: 100;
    }
</style>
```

</head>

<body>

```
<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- VIDEO -->
<video id="bgVideo" loop muted playsinline>
    <source src="background.mp4" type="video/mp4">
</video>

<!-- ENTER -->
<div class="enter-screen" id="enterScreen">
    <div class="enter-text">click to enter</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="#" class="icon" target="_blank">
        <span>TikTok</span>
    </a>

    <a href="#" class="icon" target="_blank">
        <span>X</span>
    </a>
</div>

<!-- BUTTON -->
<div class="learn-more">
    <a href="#">learn more</a>
</div>

<!-- TEXT -->
<div class="ca-text">CA : Coming Soon</div>

<script>
    const enterScreen = document.getElementById('enterScreen');
    const music = document.getElementById('bgMusic');
    const video = document.getElementById('bgVideo');

    enterScreen.onclick = () => {
        music.play();
        video.play();
        enterScreen.classList.add('hidden');
    };
</script>
