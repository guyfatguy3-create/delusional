<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$DELUSIONAL</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: black;
            font-family: Arial, sans-serif;
        }

        /* FULLSCREEN VIDEO */
        #bgVideo {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            object-position: center center;
            transform: translate(-50%, -50%);
            z-index: 0;
            background: black;
        }

        .enter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
        }

        .enter-text {
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .enter-screen.hidden {
            display: none;
        }

        .sidebar {
            position: fixed;
            left: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: rgba(255,255,255,0.7);
            font-size: 9px;
        }

        .icon:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .learn-more {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
        }

        .learn-more a {
            display: block;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .learn-more a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .ca-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 100;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <video id="bgVideo" loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>

    <div class="enter-screen" id="enterScreen">
        <div class="enter-text">click to enter</div>
    </div>

    <div class="sidebar">
        <a href="#" class="icon" target="_blank">TikTok</a>
        <a href="#" class="icon" target="_blank">X</a>
    </div>

    <div class="learn-more">
        <a href="#">learn more</a>
    </div>

    <div class="ca-text">CA : Coming Soon</div>

    <script>
        const enterScreen = document.getElementById('enterScreen');
        const music = document.getElementById('bgMusic');
        const video = document.getElementById('bgVideo');

        enterScreen.onclick = () => {
            music.play();
            video.play();
            enterScreen.classList.add('hidden');
        };
    </script>

</body>
</html>
